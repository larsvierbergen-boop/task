<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vault">
  <title>Vault</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --text: #e8e8e8;
      --muted: #666;
      --accent: #7c9e87;
      --accent-dim: rgba(124, 158, 135, 0.15);
      --danger: #c0604a;
      --priority1: #c0604a;
      --priority2: #c49a3c;
      --priority3: #5a8fa8;
      --done: #3a3a3a;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --font: -apple-system, 'Inter', sans-serif;
      --radius: 10px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overscroll-behavior: none;
    }

    /* ── SETUP SCREEN ── */
    #setup {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 32px;
    }

    .setup-logo {
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
    }

    .setup-title {
      font-size: 26px;
      font-weight: 300;
      letter-spacing: -0.03em;
      text-align: center;
      line-height: 1.3;
      color: var(--text);
    }

    .setup-form {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .field-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      color: var(--text);
      font-size: 15px;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    .btn-primary {
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      border-radius: var(--radius);
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 4px;
    }

    .btn-primary:active { opacity: 0.8; }

    .setup-hint {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    /* ── MAIN APP ── */
    #app {
      display: none;
      flex-direction: column;
      min-height: 100dvh;
    }

    #app.visible { display: flex; }

    /* ── HEADER ── */
    .app-header {
      padding: calc(var(--safe-top) + 16px) 20px 12px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .app-wordmark {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text);
      font-size: 16px;
      transition: background 0.15s;
    }

    .icon-btn:active { background: var(--surface2); }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 4px;
    }

    .tab {
      flex: 1;
      padding: 8px 4px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }

    .tab.active {
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* ── CONTENT ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px calc(var(--safe-bottom) + 90px);
    }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .section-title {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }

    .section-count {
      font-size: 11px;
      color: var(--muted);
      opacity: 0.6;
    }

    /* ── TASK CARDS ── */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 24px;
    }

    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      gap: 12px;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .task-card:active { background: var(--surface2); }

    .task-card.done {
      opacity: 0.45;
    }

    .task-card.done .task-title {
      text-decoration: line-through;
      color: var(--muted);
    }

    .priority-stripe {
      width: 3px;
      border-radius: 2px;
      flex-shrink: 0;
      align-self: stretch;
    }

    .p1 { background: var(--priority1); }
    .p2 { background: var(--priority2); }
    .p3 { background: var(--priority3); }
    .p0 { background: transparent; }

    .task-main {
      flex: 1;
      min-width: 0;
    }

    .task-title {
      font-size: 15px;
      line-height: 1.4;
      font-weight: 400;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .meta-chip {
      font-size: 11px;
      color: var(--muted);
      background: var(--surface2);
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .meta-chip.project { color: var(--accent); }
    .meta-chip.due { color: var(--danger); }
    .meta-chip.overdue { color: var(--danger); background: rgba(192,96,74,0.12); }

    .checkbox-wrap {
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
      padding-top: 2px;
    }

    .checkbox {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-size: 11px;
      color: transparent;
      flex-shrink: 0;
    }

    .task-card.done .checkbox {
      background: var(--accent);
      border-color: var(--accent);
      color: #0f0f0f;
    }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
    }

    .empty-icon { font-size: 36px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; line-height: 1.6; }

    /* ── QUICK ADD ── */
    .quick-add-bar {
      position: fixed;
      bottom: var(--safe-bottom);
      left: 0;
      right: 0;
      padding: 12px 16px calc(12px + var(--safe-bottom));
      background: var(--bg);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(16px);
      z-index: 20;
    }

    .quick-add-inner {
      display: flex;
      gap: 8px;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      transition: border-color 0.15s;
    }

    .quick-add-inner:focus-within {
      border-color: var(--accent);
    }

    #quick-input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-size: 15px;
      outline: none;
      font-family: var(--font);
    }

    #quick-input::placeholder { color: var(--muted); }

    .add-btn {
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      border-radius: 8px;
      width: 32px;
      height: 32px;
      font-size: 18px;
      font-weight: 300;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    .add-btn:active { opacity: 0.7; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 30;
      display: none;
      align-items: flex-end;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      padding: 24px 20px calc(24px + var(--safe-bottom));
      width: 100%;
      max-height: 85dvh;
      overflow-y: auto;
    }

    .modal-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }

    .modal-task-title {
      font-size: 16px;
      color: var(--text);
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .modal-fields {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .modal-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      background: var(--surface2);
      border-radius: var(--radius);
    }

    .modal-row-label {
      font-size: 13px;
      color: var(--muted);
    }

    .modal-row-value {
      font-size: 13px;
      color: var(--text);
      font-family: var(--font-mono);
    }

    select {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 13px;
      font-family: var(--font-mono);
      outline: none;
      cursor: pointer;
    }

    select option { background: var(--surface2); color: var(--text); }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-secondary:active { background: var(--border); }

    .btn-danger {
      background: none;
      color: var(--danger);
      border: 1px solid rgba(192,96,74,0.3);
      border-radius: var(--radius);
      padding: 13px;
      font-size: 15px;
      cursor: pointer;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: calc(80px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      padding: 10px 16px;
      border-radius: 20px;
      opacity: 0;
      transition: all 0.2s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 50;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── LOADING ── */
    .loading {
      text-align: center;
      padding: 48px;
      color: var(--muted);
      font-size: 13px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-banner {
      background: rgba(192,96,74,0.12);
      border: 1px solid rgba(192,96,74,0.3);
      color: var(--danger);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 13px;
      margin-bottom: 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div>
    <div class="setup-logo">Vault</div>
  </div>
  <div class="setup-title">Verbind je<br>Obsidian vault</div>
  <div class="setup-form">
    <div class="field-group">
      <div class="field-label">GitHub Token</div>
      <input type="password" id="s-token" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
    </div>
    <div class="field-group">
      <div class="field-label">Gebruikersnaam</div>
      <input type="text" id="s-owner" placeholder="jouw-github-naam" autocomplete="off">
    </div>
    <div class="field-group">
      <div class="field-label">Repository</div>
      <input type="text" id="s-repo" placeholder="obsidian-vault" autocomplete="off">
    </div>
    <div class="field-group">
      <div class="field-label">Daily Notes map (optioneel)</div>
      <input type="text" id="s-folder" placeholder="00. Daily Notes" autocomplete="off">
    </div>
    <div class="field-group">
      <div class="field-label">Datum formaat</div>
      <input type="text" id="s-format" placeholder="Daily Notes/YYYY-MM-DD" value="Daily Notes/YYYY-MM-DD">
    </div>
    <button class="btn-primary" onclick="saveSetup()">Verbinden →</button>
  </div>
  <div class="setup-hint">
    Maak een GitHub Personal Access Token aan met<br>
    <strong>repo</strong> rechten via github.com/settings/tokens
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="app-header">
    <div class="header-top">
      <span class="app-wordmark">Vault</span>
      <div class="header-actions">
        <button class="icon-btn" onclick="refreshTasks()" title="Vernieuwen">↻</button>
        <button class="icon-btn" onclick="resetSetup()" title="Instellingen">⚙</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('today')" id="tab-today">Vandaag</button>
      <button class="tab" onclick="switchTab('upcoming')" id="tab-upcoming">Gepland</button>
      <button class="tab" onclick="switchTab('inbox')" id="tab-inbox">Inbox</button>
      <button class="tab" onclick="switchTab('done')" id="tab-done">Klaar</button>
    </div>
  </header>

  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div>Vault laden…</div>
  </div>

  <div class="quick-add-bar">
    <div class="quick-add-inner">
      <input type="text" id="quick-input" placeholder="Taak toevoegen… @when(morgen) [[Project]]" autocomplete="off">
      <button class="add-btn" onclick="quickAdd()">+</button>
    </div>
  </div>
</div>

<!-- TASK MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-inner">
    <div class="modal-handle"></div>
    <div class="modal-title">Taak</div>
    <div class="modal-task-title" id="modal-task-title"></div>
    <div class="modal-fields" id="modal-fields"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let config = JSON.parse(localStorage.getItem('vault-config') || 'null');
let allTasks = [];
let fileCache = {}; // path → {content, sha}
let currentTab = 'today';
let activeTask = null;

// ── SETUP ──
function saveSetup() {
  const token = document.getElementById('s-token').value.trim();
  const owner = document.getElementById('s-owner').value.trim();
  const repo = document.getElementById('s-repo').value.trim();
  const folder = document.getElementById('s-folder').value.trim();
  const format = document.getElementById('s-format').value.trim();

  if (!token || !owner || !repo) {
    showToast('Vul alle verplichte velden in');
    return;
  }

  config = { token, owner, repo, folder, format };
  localStorage.setItem('vault-config', JSON.stringify(config));
  startApp();
}

function resetSetup() {
  if (!confirm('Verbinding verwijderen?')) return;
  localStorage.removeItem('vault-config');
  location.reload();
}

function startApp() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  refreshTasks();
}

// ── GITHUB API ──
async function ghFetch(path, opts = {}) {
  const url = `https://api.github.com/repos/${config.owner}/${config.repo}${path}`;
  const res = await fetch(url, {
    ...opts,
    headers: {
      'Authorization': `Bearer ${config.token}`,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json',
      ...(opts.headers || {})
    }
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `HTTP ${res.status}`);
  }
  return res.json();
}

async function getFile(path) {
  const data = await ghFetch(`/contents/${encodeURIComponent(path)}?ref=main`);
  const content = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
  fileCache[path] = { content, sha: data.sha };
  return fileCache[path];
}

async function writeFile(path, content, sha, message) {
  const encoded = btoa(unescape(encodeURIComponent(content)));
  const body = { message, content: encoded, branch: 'main' };
  if (sha) body.sha = sha;
  return ghFetch(`/contents/${encodeURIComponent(path)}`, {
    method: 'PUT',
    body: JSON.stringify(body)
  });
}

async function getAllMdFiles() {
  const data = await ghFetch(`/git/trees/main?recursive=1`);
  return data.tree
    .filter(f => f.type === 'blob' && f.path.endsWith('.md'))
    .map(f => f.path);
}

// ── TASK PARSER ──
function parseTask(line, lineIndex, filePath) {
  const m = line.match(/^(\s*)-\s+\[([ x])\]\s+(.+)$/);
  if (!m) return null;

  const done = m[2] === 'x';
  let rest = m[3];
  const task = { raw: line, lineIndex, filePath, done, title: '', when: null, time: null, duration: null, due: null, priority: null, tags: [], project: null, created: null, completed: null };

  const annots = /@(\w+)\(([^)]*)\)/g;
  let am;
  while ((am = annots.exec(rest)) !== null) {
    const [full, k, v] = am;
    if (k === 'when') task.when = v;
    else if (k === 'time') task.time = v;
    else if (k === 'duration') task.duration = v;
    else if (k === 'due') task.due = v;
    else if (k === 'created') task.created = v;
    else if (k === 'completed') task.completed = v;
    rest = rest.replace(full, '');
  }

  const pm = rest.match(/!\(([123])\)/);
  if (pm) { task.priority = parseInt(pm[1]); rest = rest.replace(pm[0], ''); }

  const wm = rest.match(/\[\[([^\]]+)\]\]/);
  if (wm) { task.project = wm[1]; rest = rest.replace(wm[0], ''); }

  const tm = /#([\w-]+)/g;
  let tmatch;
  while ((tmatch = tm.exec(rest)) !== null) task.tags.push(tmatch[1]);
  rest = rest.replace(/#[\w-]+/g, '');

  task.title = rest.trim().replace(/\s+/g, ' ');
  return task;
}

function serializeTask(task) {
  let parts = [task.title];
  if (task.when) parts.push(`@when(${task.when})`);
  if (task.time) parts.push(`@time(${task.time})`);
  if (task.duration) parts.push(`@duration(${task.duration})`);
  if (task.project) parts.push(`[[${task.project}]]`);
  if (task.priority) parts.push(`!(${task.priority})`);
  if (task.tags.length) parts.push(...task.tags.map(t => `#${t}`));
  if (task.due) parts.push(`@due(${task.due})`);
  if (task.created) parts.push(`@created(${task.created})`);
  if (task.completed) parts.push(`@completed(${task.completed})`);
  return `- ${task.done ? '[x]' : '[ ]'} ${parts.join(' ')}`;
}

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function isToday(when) {
  if (!when) return false;
  return when === 'today' || when === 'vandaag' || when === todayStr();
}

function isPast(when) {
  if (!when || ['inbox', 'someday', 'anytime', 'ooit', 'altijd'].includes(when)) return false;
  if (isToday(when)) return false;
  return when < todayStr();
}

function isFuture(when) {
  if (!when || ['inbox', 'someday', 'anytime', 'ooit', 'altijd', 'today', 'vandaag'].includes(when)) return false;
  return when > todayStr();
}

function isInbox(when) {
  return !when || when === 'inbox' || when === 'someday' || when === 'anytime' || when === 'ooit' || when === 'altijd';
}

function parseNaturalDate(input) {
  const lower = input.toLowerCase().trim();
  const d = new Date();
  const map = { vandaag: 0, today: 0, morgen: 1, tomorrow: 1, overmorgen: 2 };
  if (map[lower] !== undefined) {
    d.setDate(d.getDate() + map[lower]);
    return d.toISOString().split('T')[0];
  }
  const days = { maandag: 1, dinsdag: 2, woensdag: 3, donderdag: 4, vrijdag: 5, zaterdag: 6, zondag: 0, monday: 1, tuesday: 2, wednesday: 3, thursday: 4, friday: 5, saturday: 6, sunday: 0 };
  if (days[lower] !== undefined) {
    const diff = (days[lower] - d.getDay() + 7) % 7 || 7;
    d.setDate(d.getDate() + diff);
    return d.toISOString().split('T')[0];
  }
  const over = lower.match(/^(?:over|in) (\d+) dag/);
  if (over) { d.setDate(d.getDate() + parseInt(over[1])); return d.toISOString().split('T')[0]; }
  if (/^\d{4}-\d{2}-\d{2}$/.test(lower)) return lower;
  return lower;
}

// ── LOAD TASKS ──
async function refreshTasks() {
  renderLoading();
  fileCache = {};
  allTasks = [];

  try {
    const files = await getAllMdFiles();
    const relevant = files.filter(f => {
      if (config.folder && !f.startsWith(config.folder)) {
        // include daily notes folder + root files
      }
      return true;
    }).slice(0, 40); // limit to avoid rate limits

    await Promise.all(relevant.map(async (path) => {
      try {
        const { content } = await getFile(path);
        const lines = content.split('\n');
        lines.forEach((line, i) => {
          const t = parseTask(line, i, path);
          if (t) allTasks.push(t);
        });
      } catch (_) {}
    }));

    renderCurrentTab();
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="error-banner">Kon vault niet laden: ${e.message}<br><small>Controleer je token en repository naam.</small></div>`;
  }
}

// ── RENDER ──
function renderLoading() {
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div>Vault laden…</div>';
}

function switchTab(tab) {
  currentTab = tab;
  ['today', 'upcoming', 'inbox', 'done'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
  });
  renderCurrentTab();
}

function renderCurrentTab() {
  let tasks;
  switch (currentTab) {
    case 'today':
      tasks = allTasks.filter(t => !t.done && (isToday(t.when) || isPast(t.when)));
      break;
    case 'upcoming':
      tasks = allTasks.filter(t => !t.done && isFuture(t.when));
      break;
    case 'inbox':
      tasks = allTasks.filter(t => !t.done && isInbox(t.when));
      break;
    case 'done':
      tasks = allTasks.filter(t => t.done).slice(-30).reverse();
      break;
  }

  // Sort: priority first, then by when
  tasks.sort((a, b) => {
    if (a.priority && b.priority) return a.priority - b.priority;
    if (a.priority) return -1;
    if (b.priority) return 1;
    return 0;
  });

  const labels = { today: 'Vandaag', upcoming: 'Gepland', inbox: 'Inbox', done: 'Klaar' };
  const empty = { today: 'Niks gepland voor vandaag', upcoming: 'Geen geplande taken', inbox: 'Inbox is leeg', done: 'Nog niks afgerond' };

  let html = `<div class="section-header"><span class="section-title">${labels[currentTab]}</span><span class="section-count">${tasks.length}</span></div>`;

  if (tasks.length === 0) {
    html += `<div class="empty"><div class="empty-icon">${currentTab === 'done' ? '✓' : '◦'}</div><div class="empty-text">${empty[currentTab]}</div></div>`;
  } else {
    html += '<div class="task-list">';
    tasks.forEach((task, idx) => {
      html += renderTaskCard(task, idx);
    });
    html += '</div>';
  }

  document.getElementById('content').innerHTML = html;
}

function renderTaskCard(task, idx) {
  const pClass = task.priority ? `p${task.priority}` : 'p0';
  const overdue = isPast(task.when);

  let meta = '';
  if (task.project) meta += `<span class="meta-chip project">[[${task.project}]]</span>`;
  if (task.when && !isToday(task.when) && task.when !== 'inbox') {
    meta += `<span class="meta-chip ${overdue ? 'overdue' : ''}">${task.when}</span>`;
  }
  if (task.due) meta += `<span class="meta-chip due">⏰ ${task.due}</span>`;
  if (task.time) meta += `<span class="meta-chip">${task.time}</span>`;
  task.tags.forEach(t => { meta += `<span class="meta-chip">#${t}</span>`; });

  return `
    <div class="task-card ${task.done ? 'done' : ''}" onclick="openTask(${idx}, ${JSON.stringify(task.filePath).replace(/"/g, '&quot;')}, ${task.lineIndex})">
      <div class="priority-stripe ${pClass}"></div>
      <div class="checkbox-wrap">
        <div class="checkbox">${task.done ? '✓' : ''}</div>
      </div>
      <div class="task-main">
        <div class="task-title">${escHtml(task.title)}</div>
        ${meta ? `<div class="task-meta">${meta}</div>` : ''}
      </div>
    </div>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── TASK MODAL ──
function openTask(displayIdx, filePath, lineIndex) {
  // Find task by file + line
  const task = allTasks.find(t => t.filePath === filePath && t.lineIndex === lineIndex);
  if (!task) return;
  activeTask = task;

  document.getElementById('modal-task-title').textContent = task.title;

  let fields = '';

  // When selector
  const whenOptions = ['inbox', 'today', 'tomorrow', 'anytime', 'someday', todayStr()];
  const currentWhen = task.when || 'inbox';
  fields += `<div class="modal-row">
    <span class="modal-row-label">Wanneer</span>
    <select id="m-when" onchange="updateWhen(this.value)">
      <option value="inbox" ${currentWhen==='inbox'?'selected':''}>Inbox</option>
      <option value="today" ${isToday(currentWhen)?'selected':''}>Vandaag</option>
      <option value="${todayStr()}" ${currentWhen===todayStr()?'selected':''}>Vandaag (${todayStr()})</option>
      <option value="anytime" ${currentWhen==='anytime'?'selected':''}>Anytime</option>
      <option value="someday" ${currentWhen==='someday'?'selected':''}>Someday</option>
    </select>
  </div>`;

  // Priority
  fields += `<div class="modal-row">
    <span class="modal-row-label">Prioriteit</span>
    <select id="m-priority" onchange="updatePriority(this.value)">
      <option value="0" ${!task.priority?'selected':''}>Geen</option>
      <option value="1" ${task.priority===1?'selected':''}>🔴 Hoog</option>
      <option value="2" ${task.priority===2?'selected':''}>🟡 Middel</option>
      <option value="3" ${task.priority===3?'selected':''}>🔵 Laag</option>
    </select>
  </div>`;

  if (task.project) {
    fields += `<div class="modal-row"><span class="modal-row-label">Project</span><span class="modal-row-value">[[${task.project}]]</span></div>`;
  }
  if (task.due) {
    fields += `<div class="modal-row"><span class="modal-row-label">Deadline</span><span class="modal-row-value">⏰ ${task.due}</span></div>`;
  }

  document.getElementById('modal-fields').innerHTML = fields;

  let actions = `
    <button class="btn-primary" onclick="toggleDone()">${task.done ? 'Markeer als open' : 'Markeer als klaar ✓'}</button>
    <button class="btn-secondary" onclick="closeModal()">Sluiten</button>
  `;

  document.getElementById('modal-actions').innerHTML = actions;
  document.getElementById('modal').classList.add('open');
}

async function updateWhen(value) {
  if (!activeTask) return;
  activeTask.when = value || null;
  await saveTask(activeTask);
}

async function updatePriority(value) {
  if (!activeTask) return;
  activeTask.priority = parseInt(value) || null;
  await saveTask(activeTask);
}

async function toggleDone() {
  if (!activeTask) return;
  activeTask.done = !activeTask.done;
  if (activeTask.done) {
    activeTask.completed = todayStr();
  } else {
    activeTask.completed = null;
  }
  await saveTask(activeTask);
  closeModal();
}

async function saveTask(task) {
  try {
    const cached = fileCache[task.filePath];
    if (!cached) { showToast('Bestand niet in cache'); return; }

    const lines = cached.content.split('\n');
    lines[task.lineIndex] = serializeTask(task);
    const newContent = lines.join('\n');

    showToast('Opslaan…');
    const result = await writeFile(task.filePath, newContent, cached.sha, `Taak bijgewerkt: ${task.title}`);
    fileCache[task.filePath] = { content: newContent, sha: result.content.sha };

    showToast('Opgeslagen ✓');
    renderCurrentTab();
  } catch (e) {
    showToast(`Fout: ${e.message}`);
  }
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('open');
  activeTask = null;
}

// ── QUICK ADD ──
async function quickAdd() {
  const input = document.getElementById('quick-input');
  const raw = input.value.trim();
  if (!raw) return;

  // Parse inline annotations from input
  let title = raw;
  let when = null, project = null, priority = null, due = null;

  const whenM = raw.match(/@when\(([^)]+)\)/);
  if (whenM) { when = parseNaturalDate(whenM[1]); title = title.replace(whenM[0], ''); }

  const dueM = raw.match(/@due\(([^)]+)\)/);
  if (dueM) { due = parseNaturalDate(dueM[1]); title = title.replace(dueM[0], ''); }

  const projM = raw.match(/\[\[([^\]]+)\]\]/);
  if (projM) { project = projM[1]; title = title.replace(projM[0], ''); }

  const prioM = raw.match(/!\(([123])\)/);
  if (prioM) { priority = parseInt(prioM[1]); title = title.replace(prioM[0], ''); }

  title = title.trim().replace(/\s+/g, ' ');

  const task = {
    title, when, project, priority, due,
    done: false, time: null, duration: null, tags: [],
    created: todayStr(), completed: null, recurring: null
  };

  const taskLine = serializeTask(task);
  const notePath = getTodayNotePath();

  try {
    showToast('Toevoegen…');
    input.value = '';

    let content = '';
    let sha = null;

    try {
      const file = await getFile(notePath);
      content = file.content;
      sha = file.sha;
    } catch {
      const today = new Date();
      const dayStr = today.toLocaleDateString('nl-NL', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      content = `# ${dayStr}\n\n## Taken\n\n`;
    }

    if (content.includes('## Taken\n')) {
      const idx = content.indexOf('## Taken\n') + '## Taken\n'.length;
      content = content.slice(0, idx) + '\n' + taskLine + '\n' + content.slice(idx);
    } else {
      content += `\n${taskLine}\n`;
    }

    const result = await writeFile(notePath, content, sha, `Taak toegevoegd: ${title}`);
    fileCache[notePath] = { content, sha: result.content.sha };

    // Add to local state
    const lines = content.split('\n');
    for (let i = 0; i < lines.length; i++) {
      if (lines[i] === taskLine) {
        const parsed = parseTask(lines[i], i, notePath);
        if (parsed) allTasks.push(parsed);
        break;
      }
    }

    showToast('Taak toegevoegd ✓');
    if (when && (isToday(when) || !when)) switchTab('today');
    else if (!when) switchTab('inbox');
    renderCurrentTab();
  } catch (e) {
    showToast(`Fout: ${e.message}`);
  }
}

function getTodayNotePath() {
  const format = config.format || 'Daily Notes/YYYY-MM-DD';
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  return format.replace('YYYY', yyyy).replace('MM', mm).replace('DD', dd) + '.md';
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── ENTER KEY ──
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.id === 'quick-input') quickAdd();
  if (e.key === 'Escape') closeModal();
});

// ── BOOT ──
if (config) {
  startApp();
}
</script>
